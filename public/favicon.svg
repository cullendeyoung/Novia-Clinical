<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main vertical line -->
  <line x1="20" y1="0" x2="20" y2="40" stroke="#0077B6" stroke-width="2" />
  <!-- Main horizontal line -->
  <line x1="0" y1="20" x2="40" y2="20" stroke="#0077B6" stroke-width="2" />
  <!-- Diagonal lines -->
  <line x1="5" y1="5" x2="35" y2="35" stroke="#0077B6" stroke-width="1.5" />
  <line x1="35" y1="5" x2="5" y2="35" stroke="#0077B6" stroke-width="1.5" />
  <!-- Secondary diagonals -->
  <line x1="10" y1="2" x2="30" y2="38" stroke="#00B4D8" stroke-width="1" />
  <line x1="30" y1="2" x2="10" y2="38" stroke="#00B4D8" stroke-width="1" />
  <!-- Center dot -->
  <circle cx="20" cy="20" r="3" fill="#00B4D8" />
  <!-- Top accent -->
  <circle cx="20" cy="3" r="2" fill="#00B4D8" />
</svg>
